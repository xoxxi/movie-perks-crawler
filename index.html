<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무비픽 — 영화 특전 모아보기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f7f6f4;
      --white: #ffffff;
      --accent: #7c3aed;
      --accent-light: #ede9fe;
      --text: #1a1a1a;
      --text-sub: #6b7280;
      --text-light: #9ca3af;
      --border: #e5e7eb;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 0.4rem; font-weight: 900; font-size: 1.1rem; letter-spacing: -0.03em; }
    .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.85rem; font-weight: 900; }
    .header-badge { font-size: 0.7rem; color: var(--text-light); }

    /* HERO */
    .hero { background: var(--white); padding: 3rem 2rem 2.5rem; border-bottom: 1px solid var(--border); }
    .hero-inner { max-width: 680px; margin: 0 auto; text-align: center; }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--accent-light); color: var(--accent);
      font-size: 0.72rem; font-weight: 700; padding: 0.3rem 0.8rem;
      border-radius: 100px; margin-bottom: 1.2rem;
    }
    .hero-tag::before { content: '●'; font-size: 0.4rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900; line-height: 1.2; letter-spacing: -0.04em; margin-bottom: 0.8rem; }
    h1 span { color: var(--accent); }
    .hero-sub { font-size: 0.88rem; color: var(--text-sub); font-weight: 300; line-height: 1.7; }

    /* MAIN */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 5rem; }
    .count-text { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 1.2rem; }
    .count-text strong { color: var(--accent); font-weight: 700; }

    /* MOVIE GRID (메인) */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    /* MOVIE CARD (메인 - 영화별) */
    .movie-card {
      background: var(--white);
      border-radius: 16px;
      padding: 1.4rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.2s ease;
      animation: fadeUp 0.35s ease both;
    }
    .movie-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--accent-light); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .movie-title-main {
      font-size: 1rem; font-weight: 700; color: var(--text);
      line-height: 1.35; letter-spacing: -0.02em; margin-bottom: 1rem;
    }
    .movie-divider { height: 1px; background: var(--border); margin-bottom: 0.9rem; }

    /* 특전 뱃지 리스트 */
    .perk-list { display: flex; flex-direction: column; gap: 0.45rem; }
    .perk-item {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .chain-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .chain-dot.메가박스 { background: #f59e0b; }
    .chain-dot.CGV      { background: #ef4444; }
    .chain-dot.롯데시네마 { background: #3b82f6; }

    .perk-benefit {
      font-size: 0.75rem; font-weight: 500; color: var(--text-sub);
      flex: 1;
    }
    .perk-tag {
      font-size: 0.62rem; font-weight: 700; padding: 0.15rem 0.45rem;
      border-radius: 5px; flex-shrink: 0;
    }
    .perk-tag.포스터   { background: #d1fae5; color: #065f46; }
    .perk-tag.포토카드 { background: #dbeafe; color: #1e40af; }
    .perk-tag.굿즈     { background: #fce7f3; color: #9d174d; }
    .perk-tag.키링     { background: #fce7f3; color: #9d174d; }
    .perk-tag.엽서     { background: #fef3c7; color: #92400e; }
    .perk-tag.스티커   { background: #ede9fe; color: #5b21b6; }
    .perk-tag.기타     { background: #f3f4f6; color: #374151; }

    .more-count {
      font-size: 0.7rem; color: var(--text-light);
      margin-top: 0.3rem;
    }

    /* ── DETAIL MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 20px;
      padding: 2rem;
      width: 100%; max-width: 480px;
      max-height: 80vh; overflow-y: auto;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .modal-title {
      font-size: 1.3rem; font-weight: 900; letter-spacing: -0.03em;
      line-height: 1.3;
    }
    .modal-close {
      background: var(--bg); border: none; width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 1rem; color: var(--text-sub);
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }

    .modal-section-title {
      font-size: 0.7rem; font-weight: 700; color: var(--text-light);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .modal-perk-list { display: flex; flex-direction: column; gap: 0.7rem; }

    .modal-perk-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.8rem 1rem;
      background: var(--bg); border-radius: 10px;
    }

    .modal-chain-badge {
      font-size: 0.65rem; font-weight: 700;
      padding: 0.2rem 0.55rem; border-radius: 6px; flex-shrink: 0;
    }
    .modal-chain-badge.메가박스  { background: #fef3c7; color: #92400e; }
    .modal-chain-badge.CGV       { background: #fee2e2; color: #991b1b; }
    .modal-chain-badge.롯데시네마 { background: #dbeafe; color: #1e40af; }

    .modal-perk-info { flex: 1; }
    .modal-perk-benefit { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .modal-perk-meta { font-size: 0.72rem; color: var(--text-light); margin-top: 0.15rem; }

    .modal-perk-tag {
      font-size: 0.65rem; font-weight: 700;
      padding: 0.2rem 0.55rem; border-radius: 6px; flex-shrink: 0;
    }
    .modal-perk-tag.포스터   { background: #d1fae5; color: #065f46; }
    .modal-perk-tag.포토카드 { background: #dbeafe; color: #1e40af; }
    .modal-perk-tag.굿즈     { background: #fce7f3; color: #9d174d; }
    .modal-perk-tag.키링     { background: #fce7f3; color: #9d174d; }
    .modal-perk-tag.엽서     { background: #fef3c7; color: #92400e; }
    .modal-perk-tag.스티커   { background: #ede9fe; color: #5b21b6; }
    .modal-perk-tag.기타     { background: #f3f4f6; color: #374151; }

    .modal-link {
      display: inline-flex; align-items: center; gap: 0.3rem;
      margin-top: 0.4rem; font-size: 0.7rem;
      color: var(--accent); font-weight: 500; text-decoration: none;
    }
    .modal-link:hover { opacity: 0.7; }

    /* STATE */
    .state-box { grid-column:1/-1; padding:4rem; text-align:center; color:var(--text-light); font-size:0.85rem; }
    .state-box .emoji { font-size:2.5rem; display:block; margin-bottom:0.8rem; }

    /* FOOTER */
    footer { text-align:center; padding:2rem; font-size:0.72rem; color:var(--text-light); border-top:1px solid var(--border); background:var(--white); }

    @media (max-width:600px) {
      .hero { padding:2rem 1.2rem; }
      main { padding:1.2rem 1.2rem 4rem; }
      .movie-grid { grid-template-columns: 1fr 1fr; gap: 0.7rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">M</div>
    무비픽
  </div>
  <span class="header-badge" id="updated-badge">매일 자동 업데이트</span>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-tag">매일 자동 수집</div>
    <h1>🎬 현재 상영 중<br/><span>특전 영화</span></h1>
    <p class="hero-sub">영화를 클릭하면 극장별 특전 정보를 확인할 수 있어요.</p>
  </div>
</div>

<main>
  <div class="count-text" id="count-label">불러오는 중...</div>
  <div class="movie-grid" id="movie-grid">
    <div class="state-box"><span class="emoji">🎬</span>불러오는 중...</div>
  </div>
</main>

<footer>무비픽 · 데이터는 매일 자동 수집됩니다</footer>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-section-title">극장별 특전</div>
    <div class="modal-perk-list" id="modal-perk-list"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dwmoaiezxxjuruszukly.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3bW9haWV6eHhqdXJ1c3p1a2x5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwOTgyMzIsImV4cCI6MjA4NTY3NDIzMn0.QFibYBrvctkkFEcYLmTyFDqCJ7ZqbREPMW4qBJZ96PI';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let movieMap = {}; // { 영화제목: [perk, perk, ...] }

  async function loadPerks() {
    const { data, error } = await db
      .from('movie_perks')
      .select('*')
      .eq('status', 'active')
      .order('extracted_at', { ascending: false });

    if (error) {
      document.getElementById('movie-grid').innerHTML =
        '<div class="state-box"><span class="emoji">😢</span>데이터를 불러오지 못했어요</div>';
      return;
    }

    // 영화별로 묶기
    movieMap = {};
    (data || []).forEach(p => {
      const key = p.movie_title || '제목 없음';
      if (!movieMap[key]) movieMap[key] = [];
      movieMap[key].push(p);
    });

    renderMovies();

    if (data && data.length > 0 && data[0].extracted_at) {
      const d = new Date(data[0].extracted_at);
      document.getElementById('updated-badge').textContent =
        `${d.getMonth()+1}/${d.getDate()} 업데이트`;
    }
  }

  function renderMovies() {
    const grid = document.getElementById('movie-grid');
    const label = document.getElementById('count-label');
    const movies = Object.keys(movieMap);

    if (movies.length === 0) {
      grid.innerHTML = '<div class="state-box"><span class="emoji">🍿</span>현재 특전 이벤트가 없어요</div>';
      label.innerHTML = '특전 영화 <strong>0편</strong>';
      return;
    }

    label.innerHTML = `특전 영화 <strong>${movies.length}편</strong>`;

    grid.innerHTML = movies.map((title, i) => {
      const perks = movieMap[title];
      const preview = perks.slice(0, 3);
      const rest = perks.length - 3;

      return `
        <div class="movie-card" style="animation-delay:${i*0.05}s" onclick="openModal('${escapeHtml(title)}')">
          <div class="movie-title-main">${escapeHtml(title)}</div>
          <div class="movie-divider"></div>
          <div class="perk-list">
            ${preview.map(p => `
              <div class="perk-item">
                <div class="chain-dot ${p.chain || ''}"></div>
                <span class="perk-benefit">${p.chain || ''} · ${p.benefit_type || '기타'}</span>
                <span class="perk-tag ${p.benefit_type || '기타'}">${p.benefit_type || '기타'}</span>
              </div>
            `).join('')}
            ${rest > 0 ? `<div class="more-count">+${rest}개 더보기</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function openModal(title) {
    const perks = movieMap[title];
    if (!perks) return;

    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-perk-list').innerHTML = perks.map(p => {
      const meta = [
        p.week ? `개봉 ${p.week}주차` : '',
        p.condition || ''
      ].filter(Boolean).join(' · ');

      return `
        <div class="modal-perk-item">
          <span class="modal-chain-badge ${p.chain || ''}">${p.chain || '극장'}</span>
          <div class="modal-perk-info">
            <div class="modal-perk-benefit">${p.benefit_type || '기타'} 증정</div>
            ${meta ? `<div class="modal-perk-meta">${meta}</div>` : ''}
            ${p.source_url ? `<a class="modal-link" href="${p.source_url}" target="_blank" rel="noopener">이벤트 보기 →</a>` : ''}
          </div>
          <span class="modal-perk-tag ${p.benefit_type || '기타'}">${p.benefit_type || '기타'}</span>
        </div>
      `;
    }).join('');

    document.getElementById('modal-overlay').classList.add('open');
  }

  // 모달 닫기
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
  }

  loadPerks();
</script>
</body>
</html>
